<!DOCTYPE html>
<html>
<head>
<title>Mangolou</title>

<style>
body {
  margin: 0;
  background: #071a3d;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  text-align: center;
  padding: 50px 20px;
}

.logo {
  font-size: 48px;
  font-weight: bold;
  color: #4da3ff;
}

.card {
  margin: 40px auto;
  max-width: 500px;
  padding: 30px;
  background: rgba(255,255,255,0.1);
  border-radius: 25px;
  backdrop-filter: blur(10px);
}

h2 {
  font-size: 28px;
}

button {
  background: #2563ff;
  color: white;
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  font-size: 18px;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
🌙 Mangolou
</div>

<div class="card">

<h2>Histórias que ganham vida</h2>

<p>
Leia, descubra e acompanhe novos manhwas autorais.
</p>

<button>
Explorar histórias
</button>

</div>

</div>

</body>
</html>
